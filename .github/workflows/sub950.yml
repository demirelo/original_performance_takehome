name: Sub-950 performance gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runner
        run: python -m pip install pytest
      - name: Enforce immutable sub-950 oracle
        run: python -m pytest -q --tb=short -rf
      - name: Run official submission suite
        run: python tests/submission_tests.py
